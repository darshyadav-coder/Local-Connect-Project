<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile - Local Connect</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">Local Connect</div>

        <div class="menu">
          <a href="main.html">Home</a>
          <a href="services.html">Services</a>
          <a href="booking.html">Book Now</a>
          <a href="user-dashboard.html">Dashboard</a>
          <a href="Contact.html">Support</a>
          <a href="login.html" onclick="logout()">Logout</a>
        </div>
      </div>
    </nav>

    <section class="profile-section">
      <div class="container">
        <h1>My Profile</h1>

        <div class="profile-card">
          <div class="profile-header">
            <i class="fas fa-user-circle profile-icon"></i>
            <h2 id="profile-name">User Name</h2>
            <p id="profile-email">user@example.com</p>
          </div>

          <form id="profile-form" class="profile-form">
            <div class="form-group">
              <label for="fullname">Full Name</label>
              <input type="text" id="fullname" name="fullname" required />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" pattern="[6-9][0-9]{9}" required />
            </div>

            <div class="form-group">
              <label for="address">Address</label>
              <textarea id="address" name="address" rows="3"></textarea>
            </div>

            <div class="form-group">
              <label for="current-password">Current Password (for verification)</label>
              <input type="password" id="current-password" name="currentPassword" />
            </div>

            <div class="form-group">
              <label for="new-password">New Password (leave empty to keep current)</label>
              <input type="password" id="new-password" name="newPassword" />
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirm New Password</label>
              <input type="password" id="confirm-password" name="confirmPassword" />
            </div>

            <button type="submit" class="btn">Update Profile</button>
          </form>
        </div>
      </div>
    </section>

    <script src="./js/data.js"></script>
    <script src="./js/user-profile.js"></script>
  </body>
</html>
