<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Local Connect</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">Local Connect</div>

        <div class="menu">
          <a href="main.html">Home</a>
          <a href="services.html">Services</a>
          <a href="booking.html">Book Now</a>
          <a href="Contact.html">Support</a>
          <a href="login.html">Login</a>
          <a href="signup.html">Signup</a>
        </div>
      </div>
    </nav>

    <section class="auth-section">
      <div class="container">
        <div class="auth-card">
          <h1>Reset Password</h1>
          <p>Enter your email address and we'll send you a reset link</p>

          <div id="reset-form">
            <form id="forgot-password-form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your registered email" />
              </div>

              <button type="submit" class="btn">Send Reset Link</button>
            </form>
          </div>

          <div id="security-question" style="display: none;">
            <h3>Security Question</h3>
            <p id="security-question-text">What is your favorite color?</p>

            <form id="security-form">
              <div class="form-group">
                <label for="answer">Your Answer</label>
                <input type="text" id="answer" name="answer" required placeholder="Enter your answer" />
              </div>

              <button type="submit" class="btn">Verify Answer</button>
            </form>
          </div>

          <div id="new-password" style="display: none;">
            <h3>Set New Password</h3>

            <form id="new-password-form">
              <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password-input" name="newPassword" required minlength="6" placeholder="Enter new password" />
              </div>

              <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password-input" name="confirmPassword" required minlength="6" placeholder="Confirm new password" />
              </div>

              <button type="submit" class="btn">Update Password</button>
            </form>
          </div>

          <div class="auth-links">
            <a href="login.html">Back to Login</a>
          </div>
        </div>
      </div>
    </section>

    <script src="./js/data.js"></script>
    <script src="./js/forgot-password.js"></script>
  </body>
</html>
